<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
</head>
<body>
    <h2 id="clock"></h2>
    <script>
        function showtime(){
           const now = new Date()
            const time = now.toLocaleTimeString()
            document.getElementById("clock").textContent = time;

                
            }
        setInterval(showtime, 1000)
    </script>
</body>

</html>
