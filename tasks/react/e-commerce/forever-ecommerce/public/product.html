<!DOCTYPE html>
<html>
<head>
  <title>Product</title>

  <!-- Tailwind CDN for this practice page -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
   <nav class="flex items-center justify-between p-4 bg-white">

  <!-- Logo -->
  <div>
    <img class="w-36" src="src/assets/Logos/download.png">
  </div>

  <!-- Links -->
  <ul class="font-mono font-medium text-xl flex gap-7 py-5 text-gray-700">
    <li><a href="/">Home</a></li>
    <li><a href="/collections">Collections</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>

  <!-- Icons -->
  <div class="flex gap-8 text-lg">
    <span>🔍</span>
    <span>👤</span>
    <a href="src/pages/cart.jsx" class="relative">
          <img class="w-4" src="src/assets/Logos/cart.png"></img>
          <p class="cart-counter absolute w-4 -bottom-1 -right-1 text-center bg-gray-900 text-white aspect-square leading-4 rounded-full text-[8px]">0</p>
      </a>
  </div>

</nav>
  <div class="max-w-6xl mx-auto p-8">

    <div class="grid md:grid-cols-2 gap-10 bg-white p-6 rounded-lg shadow">

      <!-- Product image -->
      <div>
        <img id="product-image" class="w-full rounded-lg">
      </div>

      <!-- Product info -->
      <div class="flex flex-col gap-5">

        <h1 id="product-name" class="text-3xl font-bold"></h1>

        <p id="product-price" class="text-2xl text-green-600 font-semibold"></p>

        <p id="product-description" class="text-gray-600">
        </p>

        <!-- Sizes -->
        <div>
          <p class="font-semibold mb-2">Select Size</p>

          <div class="flex gap-3">
            <button class="size-btn border px-4 py-2 rounded hover:bg-black hover:text-white">S</button>
            <button class="size-btn border px-4 py-2 rounded hover:bg-black hover:text-white">M</button>
            <button class="size-btn border px-4 py-2 rounded hover:bg-black hover:text-white">L</button>
            <button class="size-btn border px-4 py-2 rounded hover:bg-black hover:text-white">XL</button>
          </div>
        </div>

        <!-- Buy button -->
        <button id="buy-now-button" class="bg-black text-white py-3 rounded hover:bg-gray-800">
          Buy Now
        </button>

      </div>

    </div>

  </div>

<script src="/product.js"></script>

</body>
</html>
